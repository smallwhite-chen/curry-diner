<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>咖哩食堂 — 原型設計</title>
<style>
  :root{
    --paper:#f4f6f3; --surface:#ffffff; --ink:#1e2a24; --muted:#6a7a70; --faint:#9aa79f;
    --line:#e4e9e4; --accent:#2f7d5b; --accent-ink:#215c43; --accent-soft:#e8f1ec;
    --sans:system-ui,"Noto Sans TC",sans-serif;
    --mono:ui-monospace,SFMono-Regular,Menlo,"JetBrains Mono",monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  .rk-wrap{max-width:760px;margin:0 auto;padding:72px 24px 56px}

  .rk-eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.22em;color:var(--accent);
    text-transform:uppercase;display:flex;align-items:center;gap:10px;margin-bottom:18px}
  .rk-eyebrow::after{content:"";height:1px;flex:1;background:var(--line)}

  .rk-title{margin:0;font-size:34px;line-height:1.15;font-weight:600;letter-spacing:-.01em;
    display:flex;align-items:baseline;flex-wrap:wrap;gap:12px}
  .rk-ver{font-family:var(--mono);font-size:13px;font-weight:500;letter-spacing:.02em;color:var(--accent-ink);
    background:var(--accent-soft);border-radius:999px;padding:3px 10px;transform:translateY(-2px)}
  .rk-lead{margin:16px 0 0;color:var(--muted);font-size:16px;line-height:1.7;max-width:60ch}

  .rk-list{list-style:none;margin:40px 0 0;padding:0;display:flex;flex-direction:column;gap:12px}
  .rk-card{display:flex;align-items:center;gap:20px;background:var(--surface);border:1px solid var(--line);
    border-radius:14px;padding:20px 22px;text-decoration:none;color:inherit;transition:border-color .15s,transform .15s}
  .rk-card:hover{border-color:var(--accent)}
  .rk-card:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  @media(prefers-reduced-motion:no-preference){.rk-card:hover{transform:translateY(-1px)}}
  .rk-card-main{flex:1;min-width:0}
  .rk-card-title{font-size:18px;font-weight:600;letter-spacing:-.01em}
  .rk-card-sub{font-size:13px;color:var(--muted);margin-top:3px}
  .rk-chips{display:flex;gap:6px;flex-shrink:0}
  .rk-chip{font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--accent-ink);
    background:var(--accent-soft);border-radius:999px;padding:3px 9px;white-space:nowrap}
  .rk-go{color:var(--accent);font-size:18px;flex-shrink:0}

  .rk-foot{margin-top:44px;font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--faint)}

  @media(max-width:560px){
    .rk-wrap{padding:48px 18px 40px}
    .rk-title{font-size:27px}
    .rk-card{flex-wrap:wrap;gap:12px}
    .rk-chips{order:3;width:100%}
    .rk-go{position:absolute}
  }
</style>
</head>
<body>
  <div class="rk-wrap">
    <div class="rk-eyebrow">Prototype&nbsp;Review&nbsp;Kit</div>
    <h1 class="rk-title">咖哩食堂 原型設計 <span class="rk-ver">v1.0.1</span></h1>
    <p class="rk-lead">點選頁面進入原型設計，每頁右下角可切換該頁原型與規格，並可下載 .md。</p>

    <ul class="rk-list">
      <li>
        <a class="rk-card" href="features/landing/index.html">
          <span class="rk-card-main">
            <span class="rk-card-title">品牌介紹頁</span>
            <span class="rk-card-sub">Hero · 關於 · 三種咖哩 · 菜單 · 顧客評價</span>
          </span>
          <span class="rk-chips">
            <span class="rk-chip">前台</span><span class="rk-chip">規格</span>
          </span>
          <span class="rk-go">→</span>
        </a>
      </li>
    </ul>

    <div class="rk-foot">PROTOTYPE REVIEW KIT · 2026</div>
  </div>
</body>
</html>
